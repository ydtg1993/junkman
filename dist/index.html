<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Junkman 组件库 - 完整文档</title>
    <script src="./junkman.js?v11"></script>
    <link href="./junkman.css?v11" rel="stylesheet"/>
    <style>
        :root {
            --sidebar-width: 240px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ============================================================
   文档内容区域样式（亮色/暗色自动适配）
   ============================================================ */
        .demo-section {
            background-color: hsl(var(--b2)); /* 次级背景 */
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            color: hsl(var(--bc)); /* 主文字色 */
        }

        .demo-section h2 {
            color: hsl(var(--p)); /* 主题主色 */
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
        }

        .demo-section .desc {
            color: hsl(var(--bc) / 0.7); /* 描述文字稍淡 */
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .demo-section .api-table {
            width: 100%;
            background-color: hsl(var(--b3) / 0.5); /* 半透明背景 */
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .demo-section .api-table th,
        .demo-section .api-table td {
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid hsl(var(--b3));
            text-align: left;
            color: hsl(var(--bc));
        }

        .demo-section .api-table th {
            background-color: hsl(var(--b3));
            font-weight: 600;
        }

        .demo-box {
            background-color: hsl(var(--b3)); /* 示例容器 */
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 0.5rem 0;
            color: hsl(var(--bc));
        }

        .demo-box pre {
            background-color: hsl(var(--b2)); /* 代码块背景 */
            padding: 0.8rem;
            border-radius: 0.4rem;
            overflow-x: auto;
            font-size: 0.85rem;
            color: hsl(var(--bc));
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
<div id="app"></div>
</body>
<script>
    // ====== 工具函数 ======
    function escapeHTML(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ========== 全局 Toast ==========
    const toast = new junkman.Toast(junkman.ToastPosition.TopRight);
    const centerToast = new junkman.Toast(junkman.ToastPosition.MiddleCenter);
    window.toast = toast;
    window.centerToast = centerToast;

    function renderSection(title, desc, apiHTML, demoHTML) {
        return `<div class="demo-section"><h2>${title}</h2><p class="desc">${desc}</p>${apiHTML}<div class="demo-box">${demoHTML}</div></div>`;
    }
</script>
<script src="tools/basic.js"></script>
<script src="tools/aid.js"></script>
<script src="tools/paginator.js"></script>
<script src="tools/table.js"></script>
<script src="tools/formbuilder.js"></script>
<script src="tools/selector.js"></script>
<script src="tools/tabs.js"></script>
<script src="tools/sidebartabs.js"></script>
<script src="tools/sortable.js"></script>
<script src="tools/cascade.js"></script>
<script src="tools/modal.js"></script>
<script>
    // ========== 使用新的多级 SidebarTabs 构建页面 ==========
    new junkman.SidebarTabs({
        container: '#app',
        items: [
            {
                label: '基础工具',
                sub: [
                    {
                        target: 'contextmenu',
                        label: 'contextmenu',
                        render: renderContextmenu,
                        afterRender: initContextmenu
                    },
                    {target: 'toast', label: 'Toast 通知', render: renderToast, afterRender: initToast},
                    {target: 'imgLoader', label: 'imgLoader', render: renderImgLoader, afterRender: initImgLoader},
                ]
            },
            {
                label: '选择器',
                sub: [
                    {target: 'toggle', label: 'Toggle 开关', render: renderToggle, afterRender: initToggle},
                    {target: 'selector', label: 'Selector 下拉菜单', render: renderSelector, afterRender: initSelector},
                    {target: 'switcher', label: 'Switcher 开关', render: renderSwitcher, afterRender: initSwitcher}
                ]
            },
            {target: 'paginator', label: 'Paginator 分页器', render: renderPaginator, afterRender: initPaginator},
            {
                label: '级联组件',
                sub: [
                    {
                        target: 'cascadeselector',
                        label: 'CascadeSelector 选择器',
                        render: renderCascadeSelector,
                        afterRender: initCascadeSelector
                    },
                    {
                        target: 'cascadetree',
                        label: 'CascadeTree 管理器',
                        render: renderCascadeTree,
                        afterRender: initCascadeTree
                    }
                ]
            },
            {target: 'table', label: 'Table 表格组件', render: renderTable, afterRender: initTable},
            {
                target: 'formbuilder',
                label: 'FormBuilder 表单构建器',
                render: renderFormBuilder,
                afterRender: initFormBuilder
            },
            {
                label: '标签页与导航',
                sub: [
                    {target: 'tabs', label: 'Tabs 标签页', render: renderTabs, afterRender: initTabs},
                    {
                        target: 'sidebartabs',
                        label: 'SidebarTabs 导航分页器',
                        render: renderSidebarTabs,
                        afterRender: initSidebarTabs
                    }
                ]
            },
            {target: 'sortable', label: 'Sortable 拖拽排序', render: renderSortable, afterRender: initSortable},
            {target: 'modal', label: 'Modal 弹窗组件', render: renderModal, afterRender: initModal},
            {
                label: '辅助工具',
                sub: [
                    {target: 'request', label: 'request', render: renderRequest, afterRender: initRequest},
                    {
                        target: 'dombuilder',
                        label: 'createDOMFromTree',
                        render: renderDOMBuilder,
                        afterRender: initDOMBuilder
                    },
                    {target: 'icons', label: 'Icon 图标', render: renderIcons},
                    {
                        target: 'dimensionalTree',
                        label: 'dimensionalTree',
                        render: renderDimensionalTree,
                        afterRender: initDimensionalTree
                    },
                    {
                        target: 'globalEvents',
                        label: 'GlobalEventManager',
                        render: renderGlobalEvents,
                        afterRender: initGlobalEvents
                    },
                ]
            },
        ],
        defaultActive: 'contextmenu'
    });
</script>
</html>
