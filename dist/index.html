<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Junkman 组件库 - 完整文档</title>
    <script src="./junkman.js?v11"></script>
    <link href="./junkman.css?v11" rel="stylesheet"/>
    <style>
        :root {
            --sidebar-width: 240px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ============================================================
   文档内容区域样式（亮色/暗色自动适配）
   ============================================================ */
        .demo-section {
            background-color: hsl(var(--b2)); /* 次级背景 */
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            color: hsl(var(--bc)); /* 主文字色 */
        }

        .demo-section h2 {
            color: hsl(var(--p)); /* 主题主色 */
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
        }

        .demo-section .desc {
            color: hsl(var(--bc) / 0.7); /* 描述文字稍淡 */
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .demo-section .api-table {
            width: 100%;
            background-color: hsl(var(--b3) / 0.5); /* 半透明背景 */
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .demo-section .api-table th,
        .demo-section .api-table td {
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid hsl(var(--b3));
            text-align: left;
            color: hsl(var(--bc));
        }

        .demo-section .api-table th {
            background-color: hsl(var(--b3));
            font-weight: 600;
        }

        .demo-box {
            background-color: hsl(var(--b3)); /* 示例容器 */
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 0.5rem 0;
            color: hsl(var(--bc));
        }

        .demo-box pre {
            background-color: hsl(var(--b2)); /* 代码块背景 */
            padding: 0.8rem;
            border-radius: 0.4rem;
            overflow-x: auto;
            font-size: 0.85rem;
            color: hsl(var(--bc));
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
<div id="app"></div>
</body>
<script>
    // ====== 工具函数 ======
    function escapeHTML(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ========== 全局 Toast ==========
    const toast = new junkman.Toast(junkman.ToastPosition.TopRight);
    const centerToast = new junkman.Toast(junkman.ToastPosition.MiddleCenter);
    window.toast = toast;
    window.centerToast = centerToast;
</script>
<script src="tools/basic.js"></script>
<script src="tools/aid.js"></script>
<script src="tools/paginator.js"></script>
<script src="tools/table.js"></script>
<script src="tools/selector.js"></script>
<script>
    function getTreeData() {
        return [
            {
                key: 1, val: "华北", nodes: [
                    {
                        key: 11, val: "北京市", nodes: [
                            {key: 111, val: "东城区", nodes: []},
                            {key: 112, val: "西城区", nodes: []},
                            {key: 113, val: "朝阳区", nodes: [{key: 1131, val: "三里屯街道", nodes: []}]}
                        ]
                    },
                    {key: 12, val: "天津市", nodes: []}
                ]
            },
            {
                key: 2, val: "华东", nodes: [
                    {key: 21, val: "上海市", nodes: [{key: 211, val: "黄浦区", nodes: []}]}
                ]
            }
        ];
    }

    function renderSection(title, desc, apiHTML, demoHTML) {
        return `<div class="demo-section"><h2>${title}</h2><p class="desc">${desc}</p>${apiHTML}<div class="demo-box">${demoHTML}</div></div>`;
    }

    function renderCascadeSelector() {
        const api = `<pre><code>new junkman.CascadeSelector(container, treeData, options)</code></pre>
      <h3>选项</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>searchable</td><td>是否搜索</td></tr>
        <tr><td>limit</td><td>最大选择数</td></tr>
        <tr><td>loadChildren</td><td>懒加载子节点</td></tr></table>`;
        const demo = `<div id="cascadeSelectorDemo" class="bg-base-100 rounded-lg" style="min-height:250px"></div>`;
        return renderSection('🌲 CascadeSelector 级联选择器', '多级树形选择，支持搜索、全选子级。', api, demo);
    }

    function renderCascadeTree() {
        const api = `<pre><code>new junkman.CascadeTree(container, treeData, options)</code></pre>
      <h3>选项</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>apiUrl</td><td>后台接口基址</td></tr>
        <tr><td>draggable</td><td>启用拖拽排序</td></tr>
        <tr><td>loadChildren</td><td>懒加载</td></tr></table>`;
        const demo = `<div id="cascadeTreeDemo" class="bg-base-100 rounded-lg" style="min-height:250px"></div>`;
        return renderSection('🌳 CascadeTree 树形管理器', '右键菜单增删改查、拖拽排序。', api, demo);
    }

    function renderSortable() {
        const api = `<pre><code>new junkman.Sortable(listElement, options)</code></pre>
      <h3>选项</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>direction</td><td>拖拽方向</td></tr>
        <tr><td>onSort</td><td>排序回调</td></tr></table>`;
        const demo = `<div id="sortableList" class="p-4 border-2 border-dashed border-gray-500 rounded-lg">
      <div class="drag-item" data-sortable-item data-id="a">📦 项目 A</div>
      <div class="drag-item" data-sortable-item data-id="b">📦 项目 B</div>
      <div class="drag-item" data-sortable-item data-id="c">📦 项目 C</div></div>`;
        return renderSection('🧲 Sortable 拖拽排序', '独立列表拖拽重排。', api, demo);
    }

    function renderModal() {
        const api = `<pre><code>new junkman.Modal(options)</code></pre>
      <h3>选项</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>title</td><td>标题</td></tr>
        <tr><td>gauze</td><td>点击遮罩关闭</td></tr></table>`;
        const demo = `<button id="openSimpleModalBtn" class="btn btn-secondary btn-sm">打开简单模态框</button>
      <button id="openRemoteModalBtn" class="btn btn-primary btn-sm">远程内容模态框</button>
      <button id="openFormModalBtn" class="btn btn-accent btn-sm">表单提交模态框</button>`;
        return renderSection('🪟 Modal 模态框', '支持遮罩、远程加载、表单。', api, demo);
    }

    function renderFormBuilder() {
        const api = `<pre><code>new junkman.FormBuilder(schema).build()</code></pre>
      <h3>FormFieldSchema 属性</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>name</td><td>字段名</td></tr>
        <tr><td>type</td><td>类型</td></tr></table>`;
        const demo = `<div id="formBuilderDemo"></div><button id="getFormDataBtn" class="btn btn-sm btn-outline mt-2">获取表单数据</button><pre id="formResult" class="bg-base-100 p-2 mt-2 rounded"></pre>`;
        return renderSection('📝 FormBuilder 表单构建器', '通过 schema 快速生成表单。', api, demo);
    }

    function renderTabs() {
        const api = `<pre><code>new junkman.Tabs(container, options)</code></pre>
      <h3>选项</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>tabs</td><td>标签项数组</td></tr>
        <tr><td>type</td><td>样式 boxed/lifted/bordered</td></tr>
        <tr><td>lazy</td><td>静态内容懒加载</td></tr></table>`;
        const demo = `<div id="tabsDemo" class="mb-4"></div><p class="text-xs text-gray-400">标签1：静态内容 | 标签2：模拟远程加载 | 标签3：禁用</p>`;
        return renderSection('📑 Tabs 标签页', '支持静态/异步内容、懒加载。', api, demo);
    }

    function renderSidebarTabs() {
        const api = `<pre><code>new junkman.SidebarTabs(options)</code></pre>
      <h3>选项</h3>
      <table class="api-table"><tr><th>属性</th><th>说明</th></tr>
        <tr><td>container</td><td>挂载容器</td></tr>
        <tr><td>items</td><td>嵌套导航项数组（支持 sub）</td></tr>
        <tr><td>defaultActive</td><td>默认激活 target</td></tr></table>`;
        const demo = `<div id="sidebarTabsDemo" class="border border-base-300 rounded-lg overflow-hidden" style="height:300px"></div>`;
        return renderSection('🗂️ SidebarTabs 文档布局', '可折叠多级导航 + 内容切换。', api, demo);
    }

    function initCascadeSelector() {
        const container = document.getElementById('cascadeSelectorDemo');
        new junkman.CascadeSelector(container, getTreeData(), {
            searchable: true, placeholder: "请选择地区", limit: 2,
            onChange: (sel) => toast.show({message: `已选: ${sel.map(n => n.val).join(', ')}`, type: 'success'})
        });
    }

    function initCascadeTree() {
        const container = document.getElementById('cascadeTreeDemo');
        new junkman.CascadeTree(container, getTreeData(), {
            apiUrl: '/api/dummy', searchable: true, draggable: true,
            onDelete: async (node) => confirm(`删除「${node.val}」？`),
            onUpdate: async (node, val) => {
                toast.show({message: `更新: ${node.val} → ${val}`, type: 'success'});
                return true;
            },
            onInsert: async (parentKey, newNode) => {
                toast.show({message: `新增子节点: ${newNode.val}`, type: 'success'});
                return true;
            }
        });
    }

    function initTabs() {
        const container = document.getElementById('tabsDemo');
        if (container) {
            new junkman.Tabs(container, {
                tabs: [
                    {label: '静态内容', content: '<div class="p-4">这里是静态标签内容。</div>'},
                    {
                        label: '远程加载', content: async (signal) => {
                            await new Promise(resolve => setTimeout(resolve, 1200));
                            if (signal.aborted) throw new Error('Aborted');
                            return '<div class="p-4 text-success">远程加载的 HTML 片段</div>';
                        }
                    },
                    {label: '禁用', content: '不可用', disabled: true}
                ],
                type: 'lifted',
                lazy: true
            });
        }
    }

    function initSidebarTabs() {
        const container = document.getElementById('sidebarTabsDemo');
        if (!container) return;
        new junkman.SidebarTabs({
            container: container,
            items: [
                {
                    label: '概述', sub: [
                        {
                            target: 'intro',
                            label: '简介',
                            render: () => '<div class="p-4">SidebarTabs 组件用于创建带左侧导航的文档布局。</div>'
                        },
                        {
                            target: 'usage',
                            label: '用法',
                            render: () => '<div class="p-4">通过配置 items 数组即可快速生成导航与内容切换。</div>'
                        }
                    ]
                }
            ],
            defaultActive: 'intro'
        });
    }

    function initSortable() {
        new junkman.Sortable(document.getElementById('sortableList'), {
            direction: 'vertical',
            onSort: (order) => {
                console.log('排序结果:', order);
                toast.show({message: '排序已更新', type: 'success'});
            }
        });
    }

    function initModal() {
        document.getElementById('openSimpleModalBtn')?.addEventListener('click', () => {
            const modal = new junkman.Modal({title: '简单模态框', aspect: {width: "400px", height: "auto"}, gauze: true});
            modal.setContent('<div class="p-4"><h3>内容区域</h3><p>这是一个简单的模态框</p></div>');
            modal.make();
        });
        document.getElementById('openRemoteModalBtn')?.addEventListener('click', () => {
            const modal = new junkman.Modal({title: '远程加载', aspect: {width: "500px", height: "auto"}, gauze: true});
            modal.setContent('加载中...');
            modal.make();
            setTimeout(() => modal.setLinkContent('<div class="p-4"><h3>动态内容</h3><p>模拟异步加载的 HTML</p></div>'), 1000);
        });
        document.getElementById('openFormModalBtn')?.addEventListener('click', () => {
            const modal = new junkman.Modal({title: '表单模态框', aspect: {width: "400px", height: "auto"}, gauze: true});
            const form = document.createElement('form');
            form.innerHTML = '<input name="username" class="input input-bordered input-sm w-full mb-2" placeholder="用户名" /><button type="submit" class="btn btn-sm btn-primary">提交</button>';
            modal.setContent(form);
            modal.bindSubmit(async (formData) => {
                toast.show({message: `提交: ${formData.get('username')}`, type: 'success'});
            });
            modal.make();
        });
    }

    function initFormBuilder() {
        const schema = [
            {name: 'username', label: '用户名', type: 'text', required: true},
            {name: 'age', label: '年龄', type: 'number'},
            {name: 'gender', label: '性别', type: 'select', options: [{key: 'm', value: '男'}, {key: 'f', value: '女'}]}
        ];
        const form = new junkman.FormBuilder(schema).build();
        document.getElementById('formBuilderDemo')?.appendChild(form);
        document.getElementById('getFormDataBtn')?.addEventListener('click', () => {
            const fd = new FormData(document.querySelector('#formBuilderDemo form'));
            const data = {};
            fd.forEach((v, k) => data[k] = v);
            document.getElementById('formResult').textContent = JSON.stringify(data, null, 2);
            toast.show({message: '已获取表单数据', type: 'success'});
        });
    }

    // ========== 使用新的多级 SidebarTabs 构建页面 ==========
    new junkman.SidebarTabs({
        container: '#app',
        items: [
            {
                label: '基础工具',
                sub: [
                    {
                        target: 'contextmenu',
                        label: 'contextmenu',
                        render: renderContextmenu,
                        afterRender: initContextmenuTabs
                    },
                    {target: 'toast', label: 'Toast 通知', render: renderToast, afterRender: initToastTabs},
                    {target: 'imgLoader', label: 'imgLoader', render: renderImgLoader, afterRender: initImgLoaderTabs},
                ]
            },
            {
                label: '选择器',
                sub: [
                    {target: 'toggle', label: 'Toggle 开关', render: renderToggle, afterRender: initToggleTabs},
                    {target: 'selector', label: 'Selector 下拉菜单', render: renderSelector, afterRender: initSelectorTabs},
                    {target: 'switcher', label: 'Switcher 开关', render: renderSwitcher, afterRender: initSwitcherTabs}
                ]
            },
            {target: 'paginator', label: 'Paginator 分页器', render: renderPaginator, afterRender: initPaginatorTabs},
            {
                label: '级联组件',
                sub: [
                    {
                        target: 'cascadeselector',
                        label: 'CascadeSelector',
                        render: renderCascadeSelector,
                        afterRender: initCascadeSelector
                    },
                    {
                        target: 'cascadetree',
                        label: 'CascadeTree',
                        render: renderCascadeTree,
                        afterRender: initCascadeTree
                    }
                ]
            },
            {target: 'table', label: 'Table', render: renderTable, afterRender: initTableTabs},
            {
                label: '标签页与导航',
                sub: [
                    {target: 'tabs', label: 'Tabs 标签页', render: renderTabs, afterRender: initTabs},
                    {
                        target: 'sidebartabs',
                        label: 'SidebarTabs',
                        render: renderSidebarTabs,
                        afterRender: initSidebarTabs
                    }
                ]
            },
            {target: 'sortable', label: 'Sortable', render: renderSortable, afterRender: initSortable},
            {target: 'modal', label: 'Modal', render: renderModal, afterRender: initModal},
            {target: 'formbuilder', label: 'FormBuilder', render: renderFormBuilder, afterRender: initFormBuilder},
            {
                label: '辅助工具',
                sub: [
                    {target: 'request', label: 'request', render: renderRequest, afterRender: initRequest},
                    {
                        target: 'dombuilder',
                        label: 'createDOMFromTree',
                        render: renderDOMBuilder,
                        afterRender: initDOMBuilder
                    },
                    {target: 'icons', label: 'Icon 图标', render: renderIcons},
                    {
                        target: 'dimensionalTree',
                        label: 'dimensionalTree',
                        render: renderDimensionalTree,
                        afterRender: initDimensionalTree
                    },
                    {target: 'globalEvents', label: 'GlobalEventManager', render: renderGlobalEvents},
                ]
            },
        ],
        defaultActive: 'contextmenu'
    });
</script>
</html>
